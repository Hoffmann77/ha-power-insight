name-template: '$RESOLVED_VERSION'
tag-template: '$RESOLVED_VERSION'

categories:
  - title: '💥 Breaking Changes'
    labels:
      - 'breaking'
  - title: '🚀 New Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'bugfix'
  - title: '🧰 Maintenance'
    labels:
      - 'chore'
      - 'docs'
      - 'dependencies'
      - 'maintenance'
      - 'refactor'

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - 'major'
      - 'breaking'
  minor:
    labels:
      - 'minor'
      - 'enhancement'
      - 'feature'
  patch:
    labels:
      - 'bugfix'
      - 'chore'
      - 'docs'
      - 'dependencies'
      - 'documentation'
      - 'refactor'
  default: patch


template: |
  ## What's Changed

  $CHANGES
