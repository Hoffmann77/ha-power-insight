name: Version Bump

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update manifest.json
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' \
            custom_components/power_insight/manifest.json > manifest.tmp
          mv manifest.tmp custom_components/power_insight/manifest.json

      - name: Update pyproject.toml
        run: |
          sed -i 's/^version = ".*"/version = "${{ steps.version.outputs.version }}"/' pyproject.toml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/power_insight/manifest.json pyproject.toml
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push origin main
